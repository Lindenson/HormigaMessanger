version: "3.9"

# =============================================================================
# Hormiga — Messenger Service (port 8080)
# Same deploy model as the Order service (TaskManager/docker-compose.yml): run the pre-built
# quarkus-app jar on a temurin base, bind to the shared platform services by hostname via env vars,
# join the external shared network. Run the parent stack first:
#   cd ../MasterProfile && docker compose up -d        # provides postgres, redis, minio, kafka
#
# ⚠️ SECURITY: this service TRUSTS the X-User-* identity headers and does NOT validate JWTs — it MUST
# sit BEHIND the Ory Oathkeeper edge that injects/validates them. NEVER expose :8080 directly to the
# internet (anyone could forge X-Role: ADMIN, e.g. against /api/system/notify). Publish only via the edge.
# =============================================================================

services:

  hormiga-messenger-app:
    image: eclipse-temurin:25
    container_name: hormiga-messenger-app
    working_dir: /messenger/quarkus-app
    volumes:
      # deploy step: copy the built app here →  cp -r target/quarkus-app ./messenger/quarkus-app
      - ./messenger:/messenger
    command: java -Xmx512M -Xms256M -jar quarkus-run.jar
    ports:
      - "8080:8080"
    environment:
      QUARKUS_PROFILE: prod
      # Cap glibc malloc arenas (default 8×cores). On a many-core host this collapses tens of GB of
      # reserved VIRTUAL address space (a reservation, not RAM) and trims RSS a little, with negligible
      # throughput impact. The real footprint stays ~2 GB under load — see docs/PERFORMANCE.md.
      MALLOC_ARENA_MAX: "2"
      # ── PostgreSQL (history + outbox + conversation + attachment + dead_letter) ──
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: hormigasdb
      DB_USER: ant
      DB_PASSWORD: ant
      # ── Redis (presence, idempotency, Tetris watermark, dead-letter confirmed-set) ──
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # ── Kafka (inbound order.events consumer; topic provisioned on the Order side) ──
      # A resolvable host is required even if the broker/topic is absent (the consumer retries and
      # readiness is not gated on it) — see application.yaml.
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # ── MinIO (attachments, two-phase presigned upload) ──
      # NB: a SINGLE endpoint is used both for the app's calls AND baked into presigned URLs, so it
      # MUST be BROWSER-REACHABLE (staging: http://91.99.6.25:9000, prod: the CDN/public host).
      # Defaults to localhost:9000 which the frontend cannot reach — override per environment.
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://localhost:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-hormiga}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-hormiga123}
      MINIO_BUCKET: ${MINIO_BUCKET:-messenger-attachments}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/q/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      - shared-network

networks:
  shared-network:
    external: true
    name: masterprofile_default
