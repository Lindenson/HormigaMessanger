"%prod":
  quarkus:
    websockets-next:
      server:
        max-message-size: 65536
        metrics:
          enabled: true
        auto-ping-interval: 10s

    datasource:
      db-kind: postgresql
      username: ${DB_USER:ant}
      password: ${DB_PASSWORD:ant}
      jdbc:
        url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:hormigasdb}
      reactive:
        url: postgres://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:hormigasdb}

    flyway:
      migrate-at-start: true
      baseline-on-migrate: true
      locations:
        - db/migration

    redis:
      hosts: redis://${REDIS_HOST:redis}:${REDIS_PORT:6379}
      timeout: 5s

    hibernate-orm:
      database:
        generation: update
      sql-load-script: no-file

    log:
      level: WARN
      category:
        "org.hibernate":
          level: WARN
          min-level: WARN

    micrometer:
      enabled: true
      export:
        prometheus:
          enabled: true
          path: /q/metrics


  processing:
    messages:
      inbound:
        queue-size: 3000
      outbound:
        batch-size: 1500
        queue-size: 5000
        polling-ms: "1000ms"
      feedback:
        additional-ms: 1000   # base added poll delay
        adjustment-factor: 2.0 # growth on drops (>1 → slow down under overload)
        recovery-factor: 0.5   # decay toward base when stable (<1)
        max-ms: 30000          # cap on the added delay
      channel:
        retry: true
        min-backoff-ms: 300
        max-backoff-ms: 1000
        max-retries: 3
      credits:
        max-value: 100
        refill-rate-per-s: 10
      collector:
        max-watermarks: 100
        every-s: "10s"
      idempotent:
        ttl-seconds: 30
      storage:
        service: redis




