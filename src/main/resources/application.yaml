"%prod":
  quarkus:
    websockets-next:
      server:
        max-message-size: 65536
        metrics:
          enabled: true
        auto-ping-interval: 10s

    datasource:
      db-kind: postgresql
      username: ${DB_USER:ant}
      password: ${DB_PASSWORD:ant}
      jdbc:
        url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:hormigasdb}
      reactive:
        url: postgres://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:hormigasdb}

    flyway:
      migrate-at-start: true
      baseline-on-migrate: true
      locations:
        - db/migration

    redis:
      hosts: redis://${REDIS_HOST:redis}:${REDIS_PORT:6379}
      timeout: 5s
      # Sized for connection-churn storms: when many WebSocket sessions close at once, each disconnect
      # fires presence + Tetris-cleanup + idempotency ops at Redis. The Vert.x defaults (pool 6 / wait
      # queue 24) reject the burst with ConnectionPoolTooBusyException. See docs/PERFORMANCE.md.
      max-pool-size: 24
      max-pool-waiting: 2048

    hibernate-orm:
      database:
        generation: update
      sql-load-script: no-file

    log:
      level: WARN
      category:
        "org.hibernate":
          level: WARN
          min-level: WARN

    micrometer:
      enabled: true
      export:
        prometheus:
          enabled: true
          path: /q/metrics

    # OpenAPI spec at /q/openapi (+ Swagger UI at /q/swagger-ui, force-included in prod for ops).
    smallrye-openapi:
      info-title: Hormigas Messenger API
      info-version: 1.0.0
      info-description: Master↔client chat — REST (chats/messages/freeze/receipts/system-notify). WebSocket protocol is documented in the README.
    swagger-ui:
      always-include: true


  processing:
    # Cross-cutting REST rate limiting (per caller × endpoint-group). Every /api/* endpoint uses
    # default-limit; a @RateLimit("group")-annotated resource uses its group. Single-instance (in-memory).
    rate-limit:
      enabled: true
      bucket-cache-max: 200000   # max distinct (group,caller) buckets held; ↑ for many callers, ↓ to bound memory
      bucket-idle-minutes: 10    # evict a caller's bucket after this idle time (state resets)
      default-limit:
        permits-per-second: 20   # sustained rate for any endpoint without a @RateLimit group
        burst: 40                # burst allowance (bucket capacity)
      groups:
        # attachments are the strictest (presigned-upload provisioning is expensive)
        attachments:
          permits-per-second: 1
          burst: 5
        # admin console — moderate
        admin:
          permits-per-second: 5
          burst: 15
    messages:
      # Re-subscribe backoff shared by the inbound/outbound publishers and the group-commit batchers:
      # on a terminal stream fault they retry indefinitely with this exponential backoff (transient
      # fault never permanently disables a stream). ↑ = calmer under repeated faults; ↓ = faster recovery.
      stream-retry:
        min-backoff-ms: 200
        max-backoff-ms: 5000
      inbound:
        queue-size: 3000        # inbound backpressure gate; over this, a send is rejected (SERVICE_OUT overloaded). ↑ absorbs bursts (more memory), ↓ sheds sooner
        # Group-commit of the inbound persist (plan B). Publisher runs PARALLEL; these coalesce
        # concurrent history+outbox writes into one tx per batch and run several tx concurrently
        # to fill the otherwise ~95%-idle DB pool (keep max-concurrent-batches ≤ DB pool size).
        persist-batch:
          max-size: 64
          linger-ms: 5
          max-concurrent-batches: 8
      # In-process L1 cache for the hot membership/block lookup the send-guard does on every inbound
      # message (Phase 2, 4.1). Write-through invalidation on block/unblock/soft-delete + this TTL
      # backstop. Single-instance; a distributed Redis L2 is a documented future (multi-instance/sharding).
      conversation-cache:
        max-size: 100000
        ttl-seconds: 60
      # Group-commit of read-status writes (READ_IN), mirroring persist-batch: READ receipts hit the DB
      # only in batches. Overflow sheds whole batches gracefully (onOverflow drop) — never stalls.
      read-batch:
        max-size: 64
        linger-ms: 10
        max-concurrent-batches: 4
      # Outbound poller (delivery of the outbox). polling-ms is a Quarkus Duration string ("1000ms"/"1s").
      outbound:
        batch-size: 1500        # rows fetched per poll; ↑ higher delivery throughput, ↓ lighter DB reads
        queue-size: 5000        # outbound backpressure gate
        polling-ms: "1000ms"    # base poll interval (Duration string)
      # Adaptive poll-delay regulator: slows the poller under drops, recovers when stable.
      feedback:
        additional-ms: 1000     # base added poll delay
        adjustment-factor: 2.0  # growth on drops — MUST be >1 (slow down under overload)
        recovery-factor: 0.5    # decay toward base when stable — MUST be <1
        max-ms: 30000           # cap on the added delay (≥ additional-ms)
      # Delivery retry to a client socket (transient send failures).
      channel:
        retry: true
        min-backoff-ms: 300     # ↑ calmer retries, ↓ faster; keep min ≤ max
        max-backoff-ms: 1000
        max-retries: 3
      # Per-connection WS flow control (token bucket) — the built-in anti-DoS / anti-flood guard.
      credits:
        max-value: 1000         # burst allowance per connection
        refill-rate-per-s: 100  # sustained per-connection send rate; aggregate ceiling ≈ connections × this
      # Outbox GC (watermark/Tetris) sweep cadence (Duration string).
      collector:
        every-s: "10s"
      # Redis idempotency dedup window (in-progress marker TTL). ≥ typical message processing time.
      idempotent:
        ttl-seconds: 30
      # Durable store selector. "redis" wires the Redis idempotency/presence/tetris beans; anything else disables them.
      storage:
        service: redis
    attachments:
      max-size-bytes: 26214400   # 25 MiB cap (enforced twice: declared at request + actual object size at confirm)
      orphan-age-seconds: 3600   # reclaim a PENDING upload that never confirmed after 1h (must exceed minio.upload-ttl-seconds)
      cleanup-batch: 200         # orphan-reclaim page size per tick; ↑ drains faster (heavier), ↓ gentler
      cleanup-every: 15m         # orphan-reclaim sweep cadence (Duration string)
      # Allowed content-types (exact, or a "type/*" wildcard). Absent = allow all. Set a whitelist in
      # prod to lock down, e.g.:  allowed-content-types: "image/*,application/pdf,text/plain"
      # (rejected at request with 415).

    # Session reapers (prod). Cadences are Duration strings.
    session:
      idle-timeout-ms: 35000        # silent-connection cutoff (missed pings); ↑ tolerates flaky links, ↓ frees phantom-online sooner
      max-pending: 1000             # per-recipient un-ACKed backlog before force-disconnect (caps the pending ZSET/outbox)
      overload-kick-batch: 100      # max heavy clients kicked per overload sweep; ↑ clears faster (burstier), ↓ smoother
      reaper-every: 15s             # liveness (idle) sweep cadence
      overload-reaper-every: 20s    # overload (backlog) sweep cadence

    # Dead-letter retract sweep (Strategy C, ADR-014).
    deadletter:
      cleanup-batch: 500            # confirmed-set drain page size per sweep; ↑ retracts faster (heavier), ↓ gentler
      cleanup-every: 30s            # sweep cadence (Duration string)

    # History retention sweep (UC-U23, FR-RET-04/05). Two classes: normal history vs longer-lived frozen.
    retention:
      history-days: 90              # purge normal history older than this (frozen excluded)
      frozen-days: 365              # longer TTL for frozen (contract) messages; must be ≥ history-days
      every: 24h                    # retention sweep cadence (Duration string)

  # Inter-service Kafka integration (ADR-007): consume order.events.
  # NB: the default MUST be a resolvable host. An unresolvable bootstrap host fails Kafka-consumer
  # construction and hard-fails startup (not just health). `localhost:9092` always resolves, so a
  # broker-less env (e2e/Karate, or prod before the broker is provisioned) still boots — the consumer
  # just retries connecting in the background. Real prod sets KAFKA_BOOTSTRAP_SERVERS to the broker.
  kafka:
    bootstrap:
      servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  mp:
    messaging:
      incoming:
        order-events-in:
          connector: smallrye-kafka
          topic: order.events
          group:
            id: hormiga-messenger
          value:
            deserializer: org.apache.kafka.common.serialization.StringDeserializer
          auto:
            offset:
              reset: earliest
          # at-least-once + idempotent handlers; failed processing nacks → redelivery.
          failure-strategy: fail
          # The Order `order.events` topic/broker is not provisioned yet (blocked on the Order side),
          # and the e2e/Karate env has no Kafka. Don't let an absent broker flip readiness DOWN — the
          # connector retries connecting in the background. Re-enable once the broker is live in the env.
          health-readiness-enabled: false

  # Order-event type contract (ASSUMED — reconcile with the Order team). Override without code change.
  messenger:
    order-events:
      type:
        master-interested: order.master.interested
        contract-reached: order.contract.concluded

  # Attachments (concept §10, ADR-010): two-phase presigned upload to MinIO. The endpoint MUST be a
  # host clients can also reach (MINIO_PUBLIC_URL split-horizon); e2e shares localhost:9000. The client
  # is lazy, so startup never depends on MinIO being up.
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:hormiga}
    secret-key: ${MINIO_SECRET_KEY:hormiga123}
    bucket: ${MINIO_BUCKET:messenger-attachments}
    upload-ttl-seconds: 600
    download-ttl-seconds: 300




