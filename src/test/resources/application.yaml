"%test":
  quarkus:
    http:
      port: 7777

  # The OrderEventConsumer's @Incoming("order-events-in") channel is backed by the in-memory
  # connector in tests (no Kafka broker / Dev Services needed). OrderEventConsumerTest drives it
  # via InMemoryConnector; the other @QuarkusTest apps just leave it idle.
  mp:
    messaging:
      incoming:
        order-events-in:
          connector: smallrye-in-memory

  processing:
    messages:
      inbound:
        queue-size: 3000
      outbound:
        batch-size: 1500
        queue-size: 5000
        polling-ms: "800ms"
      feedback:
        additional-ms: 700     # base added poll delay
        adjustment-factor: 2.0  # growth on drops (>1 → slow down)
        recovery-factor: 0.5    # decay toward base when stable (<1)
        max-ms: 30000           # cap on the added delay
      channel:
        retry: true
        min-backoff-ms: 300
        max-backoff-ms: 1000
        max-retries: 3
      credits:
        max-value: 100
        refill-rate-per-s: 10
      collector:
        max-watermarks: 100
        every-s: "10s"
      idempotent:
        ttl-seconds: 3
      storage:
        service: redis

